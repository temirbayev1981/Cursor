# Deploy HandymanOS AI to your FTP host (subdomain or folder).
# Credentials: GitHub → Settings → Secrets and variables → Actions (see DEPLOY-FTP.md).

name: Deploy FTP

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Check FTP credentials
        id: ftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP secrets missing. Add FTP_HOST, FTP_USER, FTP_PASSWORD — see DEPLOY-FTP.md"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.ftp.outputs.configured == 'true'
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
        if: steps.ftp.outputs.configured == 'true'
      - run: npm run lint
        if: steps.ftp.outputs.configured == 'true'
      - run: npm run test
        if: steps.ftp.outputs.configured == 'true'

      - name: Resolve app version
        if: steps.ftp.outputs.configured == 'true'
        run: echo "VITE_APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Build for FTP / subdomain
        if: steps.ftp.outputs.configured == 'true'
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH || '/' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_CHECKOUT_ENDPOINT: ${{ secrets.VITE_STRIPE_CHECKOUT_ENDPOINT }}
          VITE_STRIPE_SUBSCRIPTION_ENDPOINT: ${{ secrets.VITE_STRIPE_SUBSCRIPTION_ENDPOINT }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.VITE_NOTIFICATION_WEBHOOK_URL }}
          VITE_SMS_WEBHOOK_URL: ${{ secrets.VITE_SMS_WEBHOOK_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_ERROR_WEBHOOK_URL: ${{ secrets.VITE_ERROR_WEBHOOK_URL }}
          VITE_APP_VERSION: ${{ env.VITE_APP_VERSION }}

      - name: Normalize FTP server directory
        if: steps.ftp.outputs.configured == 'true'
        id: ftp_dir
        env:
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          DIR="${FTP_SERVER_DIR:-./}"
          case "$DIR" in
            */) ;;
            *) DIR="${DIR}/" ;;
          esac
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Upload dist/ to FTP (lftp, passive FTPS)
        if: steps.ftp.outputs.configured == 'true'
        timeout-minutes: 8
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ steps.ftp_dir.outputs.dir }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL || 'ftps' }}
          FTP_PORT: ${{ secrets.FTP_PORT || '21' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          PROTO="${FTP_PROTOCOL}"
          USE_SSL="false"
          SCHEME="ftp"
          if [ "$PROTO" = "ftps" ] || [ "$PROTO" = "ftps-legacy" ]; then
            USE_SSL="true"
            SCHEME="ftps"
          fi
          LFTP_SCRIPT="$(mktemp)"
          {
            echo "set ftp:passive-mode true"
            echo "set ftp:ssl-force ${USE_SSL}"
            echo "set ftp:ssl-protect-data ${USE_SSL}"
            echo "set ssl:verify-certificate no"
            echo "set net:timeout 30"
            echo "set net:max-retries 2"
            echo "set net:reconnect-interval-base 5"
            printf 'open -u %s,%s %s://%s\n' "$FTP_USER" "$FTP_PASSWORD" "$SCHEME" "$FTP_HOST"
            echo "mkdir -f ${FTP_DIR}"
            echo "cd ${FTP_DIR}"
            echo "lcd dist"
            echo "mirror --reverse --verbose"
            echo "quit"
          } > "$LFTP_SCRIPT"
          echo "FTP upload started (~4 MB, $(find dist -type f | wc -l) files)..."
          lftp -p "${FTP_PORT}" -f "$LFTP_SCRIPT"
          rm -f "$LFTP_SCRIPT"
          echo "FTP upload finished."
