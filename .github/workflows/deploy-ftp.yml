# Deploy HandymanOS AI to your FTP host (subdomain or folder).
# Credentials: GitHub → Settings → Secrets and variables → Actions (see DEPLOY-FTP.md).

name: Deploy FTP

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ftp-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - name: Check FTP credentials
        id: ftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          if [ -z "$FTP_HOST" ] || [ -z "$FTP_USER" ] || [ -z "$FTP_PASSWORD" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::FTP secrets missing. Add FTP_HOST, FTP_USER, FTP_PASSWORD — see DEPLOY-FTP.md"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.ftp.outputs.configured == 'true'
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci
        if: steps.ftp.outputs.configured == 'true'
      - run: npm run lint
        if: steps.ftp.outputs.configured == 'true'
      - run: npm run test
        if: steps.ftp.outputs.configured == 'true'

      - name: Resolve app version
        if: steps.ftp.outputs.configured == 'true'
        run: |
          echo "VITE_APP_VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"
          echo "VITE_BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Build for FTP / subdomain
        if: steps.ftp.outputs.configured == 'true'
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH || '/' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_STRIPE_PUBLISHABLE_KEY: ${{ secrets.VITE_STRIPE_PUBLISHABLE_KEY }}
          VITE_STRIPE_CHECKOUT_ENDPOINT: ${{ secrets.VITE_STRIPE_CHECKOUT_ENDPOINT }}
          VITE_STRIPE_SUBSCRIPTION_ENDPOINT: ${{ secrets.VITE_STRIPE_SUBSCRIPTION_ENDPOINT }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_NOTIFICATION_WEBHOOK_URL: ${{ secrets.VITE_NOTIFICATION_WEBHOOK_URL }}
          VITE_SMS_WEBHOOK_URL: ${{ secrets.VITE_SMS_WEBHOOK_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_ERROR_WEBHOOK_URL: ${{ secrets.VITE_ERROR_WEBHOOK_URL }}
          VITE_APP_VERSION: ${{ env.VITE_APP_VERSION }}
          VITE_BUILD_TIME: ${{ env.VITE_BUILD_TIME }}

      - name: Normalize FTP server directory
        if: steps.ftp.outputs.configured == 'true'
        id: ftp_dir
        env:
          FTP_SERVER_DIR: ${{ secrets.FTP_SERVER_DIR }}
        run: |
          DIR="${FTP_SERVER_DIR:-./}"
          case "$DIR" in
            */) ;;
            *) DIR="${DIR}/" ;;
          esac
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"

      - name: Upload dist/ to FTP (lftp, passive FTPS)
        if: steps.ftp.outputs.configured == 'true'
        timeout-minutes: 8
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_DIR: ${{ steps.ftp_dir.outputs.dir }}
          FTP_PROTOCOL: ${{ secrets.FTP_PROTOCOL || 'ftps' }}
          FTP_PORT: ${{ secrets.FTP_PORT || '21' }}
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp
          PROTO="${FTP_PROTOCOL}"
          USE_SSL="false"
          SCHEME="ftp"
          LFTP_PORT="${FTP_PORT}"
          if [ "$PROTO" = "ftps" ]; then
            # Explicit FTPS (FileZilla: "FTP over TLS") — plain ftp:// then STARTTLS
            USE_SSL="true"
            SCHEME="ftp"
            LFTP_PORT="${FTP_PORT:-21}"
          elif [ "$PROTO" = "ftps-legacy" ]; then
            # Implicit FTPS — TLS from first byte, usually port 990
            USE_SSL="true"
            SCHEME="ftps"
            LFTP_PORT="${FTP_PORT:-990}"
          fi
          LFTP_SCRIPT="$(mktemp)"
          chmod 600 "$LFTP_SCRIPT"
          {
            echo "set ftp:passive-mode true"
            echo "set ftp:ssl-allow ${USE_SSL}"
            echo "set ftp:ssl-force ${USE_SSL}"
            echo "set ftp:ssl-protect-data ${USE_SSL}"
            echo "set ftp:ssl-auth TLS"
            echo "set ssl:verify-certificate no"
            echo "set net:timeout 30"
            echo "set net:max-retries 2"
            echo "set net:reconnect-interval-base 5"
            echo "open ${SCHEME}://${FTP_HOST}:${LFTP_PORT}"
          } > "$LFTP_SCRIPT"
          # user/pass AFTER open — netrc logs in plain FTP before STARTTLS (550 error)
          printf 'user %s ' "$FTP_USER" >> "$LFTP_SCRIPT"
          printf '%s\n' "$FTP_PASSWORD" >> "$LFTP_SCRIPT"
          {
            echo "mkdir -p ${FTP_DIR}"
            echo "cd ${FTP_DIR}"
            echo "lcd dist"
            echo "mirror --reverse --verbose"
            echo "quit"
          } >> "$LFTP_SCRIPT"
          echo "FTP upload started (~4 MB, $(find dist -type f | wc -l) files)..."
          lftp -f "$LFTP_SCRIPT"
          rm -f "$LFTP_SCRIPT"
          echo "FTP upload finished."

      - name: Apply Supabase vendor PO migration (optional)
        if: steps.ftp.outputs.configured == 'true'
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Skipping DB migration — Supabase token/ref not set"
            exit 0
          fi
          SQL=$(tr '\n' ' ' < supabase/migrations/20260711000003_vendor_po_problem_description.sql)
          HTTP=$(curl -sS -o /tmp/migration.json -w "%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/database/query" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg q "$SQL" '{query:$q}')")
          echo "Migration HTTP ${HTTP}"
          cat /tmp/migration.json
          if [ "$HTTP" -ge 400 ]; then
            echo "::warning::Supabase migration request failed (columns may already exist)"
            exit 1
          fi

      - name: Deploy Supabase Edge Functions (when access token set)
        if: steps.ftp.outputs.configured == 'true'
        continue-on-error: true
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Skipping Edge Function deploy — SUPABASE_ACCESS_TOKEN or SUPABASE_PROJECT_REF not set"
            exit 0
          fi
          npx supabase@latest functions deploy openai-proxy --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase@latest functions deploy extract-pdf-text --project-ref "$SUPABASE_PROJECT_REF"
