name: Supabase smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Supabase smoke (live when secrets set)
        run: npm run smoke:supabase
        env:
          SMOKE_OPTIONAL: '1'
          SMOKE_EDGE_FUNCTIONS: '1'
          SMOKE_EDGE_FUNCTIONS_OPTIONAL: '1'
          SMOKE_RPC_OPTIONAL: ${{ github.event_name == 'push' && '1' || '0' }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
