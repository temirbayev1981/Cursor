name: Deploy Edge Functions

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check Supabase deploy credentials
        id: supa
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ] || [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Set SUPABASE_ACCESS_TOKEN and SUPABASE_PROJECT_REF in GitHub Secrets to auto-deploy Edge Functions"
            echo "::warning::Production project ref example: asxpsajdwtwamzafwvtf"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy Edge Functions
        if: steps.supa.outputs.configured == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          npx supabase@latest functions deploy openai-proxy --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase@latest functions deploy extract-pdf-text --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase@latest functions deploy send-notification --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase@latest functions deploy send-sms --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase@latest functions deploy create-checkout-session --project-ref "$SUPABASE_PROJECT_REF"
          npx supabase@latest functions deploy create-subscription-checkout --project-ref "$SUPABASE_PROJECT_REF"

      - name: Verify extract-pdf-text reachable
        if: steps.supa.outputs.configured == 'true'
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
        run: |
          URL="${VITE_SUPABASE_URL%/}/functions/v1/extract-pdf-text"
          CODE=$(curl -sS -o /tmp/probe.json -w "%{http_code}" -X POST "$URL" -H "Content-Type: application/json" -d '{"pdfBase64":"AA=="}')
          echo "Probe HTTP $CODE"
          if [ "$CODE" = "404" ]; then
            echo "::error::extract-pdf-text still returns 404 after deploy"
            cat /tmp/probe.json
            exit 1
          fi
